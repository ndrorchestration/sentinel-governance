name: Governance Sweep
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2.1.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Sentinel Governance (Bash)
        run: bash .governance/governance_check.sh

      - name: Run Sentinel Governance (PowerShell)
        run: pwsh .governance/governance_check.ps1
