# governance.example.yml
# Reference only — NOT executed by GitHub Actions.
# The live workflow is at .github/workflows/governance.yml
# This file is retained as a human-readable reference.
# See NDR-007 (Workflow File Deduplication) in knowledge-base/PATTERNS.md

name: Governance Sweep
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate workflow syntax (actionlint)
        uses: rhysd/actionlint@v1.7.7
        with:
          args: .github/workflows/governance.yml

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Sentinel Governance (Bash)
        run: bash .governance/governance_check.sh

      - name: Run Sentinel Governance (PowerShell)
        run: pwsh .governance/governance_check.ps1
